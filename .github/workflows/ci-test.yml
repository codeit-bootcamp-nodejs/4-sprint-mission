name: Run Tests on PR

on:
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    # 테스트를 위한 통합 DB 서비스 실행
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # Postgres가 준비될 때까지 대기
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push Database Schema
        # 테스트 DB에 스키마 적용
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db?schema=public
        run: npx prisma db push

      - name: Run Tests
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db?schema=public
          JWT_SECRET: test_secret
        run: npm test
