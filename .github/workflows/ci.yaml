name: CI

on:
  pull_request:
    branches:
      - main
      - develop # Assuming you might have a develop branch for PRs

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mission-11

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Use the same Node.js version as your project

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test
