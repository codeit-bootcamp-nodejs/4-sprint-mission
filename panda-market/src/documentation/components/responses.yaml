components:
  responses:
    # =============================================
    #         Generic Responses
    # =============================================
    BadRequest:
      description: 잘못된 요청 (Bad Request)
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: '잘못된 요청입니다.'

    Unauthorized:
      description: 인증 실패 (Unauthorized)
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: '로그인이 필요합니다.'

    Forbidden:
      description: 권한 없음 (Forbidden)
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: '권한이 없습니다.'

    NotFound:
      description: 리소스 없음 (NotFound)
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: '리소스를 찾을 수 없습니다.'
