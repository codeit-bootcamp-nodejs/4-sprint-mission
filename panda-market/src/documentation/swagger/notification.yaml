tags:
  - name: notification
    description: 알림 관련 API

paths:
  /notification:
    get:
      tags:
        - notification
      summary: 내 알림 목록 조회
      description: 현재 로그인된 사용자에게 온 모든 알림을 조회합니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 알림 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notification/unreads/counts:
    get:
      tags:
        - notification
      summary: 읽지 않은 알림 개수 조회
      description: 현재 로그인된 사용자의 읽지 않은 알림 개수를 조회합니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 읽지 않은 알림 개수 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UnreadNotificationCount'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notification/{id}/read:
    patch:
      tags:
        - notification
      summary: 특정 알림 읽음 처리
      description: 특정 알림을 읽음 상태로 변경합니다.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 읽음 처리할 알림의 ID
      responses:
        '200':
          description: 알림 읽음 처리 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: '자신의 알림이 아닌 경우'
          $ref: '#/components/responses/Forbidden'
        '404':
          description: '알림을 찾을 수 없음'
          $ref: '#/components/responses/NotFound'