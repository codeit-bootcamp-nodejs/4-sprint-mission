        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: '게시글 또는 댓글을 찾을 수 없음'
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - comment
      summary: 게시글 댓글 삭제
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: articleId
          required: true
          schema:
            type: integer
          description: 댓글이 달린 게시글의 ID
        - in: path
          name: commentId
          required: true
          schema:
            type: integer
          description: 삭제할 댓글의 ID
      responses:
        '200':
          description: 댓글 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: '댓글이 성공적으로 삭제되었습니다.'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: '게시글 또는 댓글을 찾을 수 없음'
          $ref: '#/components/responses/NotFound'