tags:
  - name: product
    description: 상품 관련 API

paths:
  /product:
    get:
      tags:
        - product
      summary: 상품 목록 조회
      description: 다양한 조건으로 상품 목록을 조회합니다. 인증된 사용자로 요청 시, 각 상품의 좋아요 여부(isLike)가 포함됩니다.
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: 페이지 번호
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
          description: 페이지당 상품 수
        - in: query
          name: orderBy
          schema:
            type: string
            enum: [recent, like]
            default: recent
          description: 정렬 기준
        - in: query
          name: keyword
          schema:
            type: string
          description: 검색어 (상품 이름 또는 설명)
      responses:
        '200':
          description: 상품 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - product
      summary: 상품 생성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: 상품 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /product/{id}:
    get:
      tags:
        - product
      summary: 상품 상세 조회
      description: 인증된 사용자로 요청 시, 상품의 좋아요 여부(isLike)가 포함됩니다.
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 상품 ID
      responses:
        '200':
          description: 상품 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - product
      summary: 상품 수정
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 상품 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: 상품 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - product
      summary: 상품 삭제
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 상품 ID
      responses:
        '200':
          description: 상품 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /product/{id}/likes:
    post:
      tags:
        - product
      summary: 상품 좋아요 추가
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 상품 ID
      responses:
        '201':
          description: 좋아요 추가 성공. 업데이트된 상품 객체를 반환합니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 이미 좋아요를 누른 상품
    delete:
      tags:
        - product
      summary: 상품 좋아요 취소
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 상품 ID
      responses:
        '200':
          description: 좋아요 취소 성공. 업데이트된 상품 객체를 반환합니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
