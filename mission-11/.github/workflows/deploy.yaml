name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - 김지헌-sprint11
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    # Removed: Build project step (as requested)
    # - name: Build project
    #   run: npm run build

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }} # Use SSH key for authentication
        script: |
          cd /home/ubuntu/4-sprint-mission/mission-11 # Updated path
          git pull origin 김지헌-sprint11 # Updated branch
          npm install --production
          npm run build # Build on EC2
          pm2 reload panda-market # Changed to reload
